{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-center">
    <div class="mb-4">
        <a href="{{ url_for('edification.kids') }}" class="btn btn-outline-warning rounded-pill mb-3">
            <i class="bi bi-arrow-left me-2"></i> Voltar para Ecclesia Kids
        </a>
        <h1 class="fw-bold text-warning">Jogo da Memória Bíblico</h1>
        <p class="text-muted">Encontre os pares dos personagens e elementos da Bíblia!</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div id="game-board" class="memory-grid">
                <!-- Cards serão gerados pelo JavaScript -->
            </div>
            
            <div class="mt-5 p-4 bg-light rounded-4 shadow-sm">
                <div class="row align-items-center">
                    <div class="col">
                        <h4 class="mb-0 fw-bold">Tentativas: <span id="moves">0</span></h4>
                    </div>
                    <div class="col">
                        <button onclick="resetGame()" class="btn btn-warning btn-lg fw-bold px-4 rounded-pill">
                            <i class="bi bi-arrow-clockwise me-2"></i> Reiniciar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.memory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    perspective: 1000px;
}

.memory-card {
    aspect-ratio: 1/1;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border-radius: 15px;
}

.memory-card.flipped {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    padding: 10px;
}

.card-back {
    background: linear-gradient(135deg, #ffc107, #ffdb6e);
    color: white;
}

.card-front {
    background: white;
    transform: rotateY(180deg);
}

.card-front .card-emoji {
    font-size: 3.5rem;
    line-height: 1;
}

.card-front .card-name {
    font-size: 0.7rem;
    margin-top: 8px;
    font-weight: bold;
    color: #666;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.memory-card.matched .card-front {
    background-color: #e8f5e9;
    border: 3px solid #4caf50;
}

.memory-card.flipped .card-emoji {
    animation: pulse 0.3s ease;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

@media (max-width: 576px) {
    .memory-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    .card-front .card-emoji {
        font-size: 2.5rem;
    }
    .card-front .card-name {
        font-size: 0.6rem;
    }
}
</style>

<script>
// Dados da história e palavras geradas pela IA
const aiWords = {{ game_data | tojson }};

let gameDeck = [];
let flippedCards = [];
let matchedPairs = 0;
let moves = 0;
let canFlip = true;
let emojiCache = {};

// Buscar emoji da API (URL CORRIGIDA)
async function getEmojiForWord(word) {
    if (emojiCache[word]) return emojiCache[word];
    
    try {
        // 🔥 CORRIGIDO: usar a rota correta /api/emoji-for-word/
        const response = await fetch(`/edification/api/emoji-for-word/${encodeURIComponent(word)}`);
        const data = await response.json();
        
        let emojiHtml = '';
        if (data.success && data.emoji) {
            if (data.type === 'unicode') {
                emojiHtml = `<div class="card-emoji">${data.emoji}</div>`;
            } else if (data.type === 'bootstrap') {
                emojiHtml = `<div class="card-emoji"><i class="bi ${data.emoji}" style="font-size: 3rem;"></i></div>`;
            } else if (data.type === 'custom' && data.custom_icon) {
                emojiHtml = `<div class="card-emoji"><img src="{{ url_for('static', filename='') }}${data.custom_icon}" style="width: 60px; height: 60px;"></div>`;
            } else {
                emojiHtml = `<div class="card-emoji">${word.charAt(0).toUpperCase()}</div>`;
            }
        } else {
            emojiHtml = `<div class="card-emoji">${word.charAt(0).toUpperCase()}</div>`;
        }
        
        emojiCache[word] = emojiHtml;
        return emojiHtml;
    } catch(e) {
        console.error('Erro ao buscar emoji:', e);
        return `<div class="card-emoji">${word.charAt(0).toUpperCase()}</div>`;
    }
}

// Função para obter o nome amigável
function getNameForWord(word) {
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
}

// Array fixo de palavras padrão (fallback)
const defaultWords = [
    'ARCA', 'DAVI', 'GOLIAS', 'MOISÉS',
    'LEÃO', 'PEIXE', 'POMBA', 'ESTRELA',
    'JESUS', 'CRUZ', 'BÍBLIA', 'ORAÇÃO'
];

async function createGameCards() {
    const cards = [];
    let wordsToUse = [];
    
    // Tenta usar palavras da IA
    if (aiWords && aiWords.length >= 4) {
        wordsToUse = aiWords.slice(0, 8).map(w => w.word || w);
    } else {
        wordsToUse = defaultWords.slice(0, 8);
    }
    
    for (const word of wordsToUse) {
        const cleanWord = typeof word === 'object' ? word.word : word;
        const upperWord = cleanWord.toUpperCase();
        const emojiHtml = await getEmojiForWord(upperWord);
        
        cards.push({
            id: Math.random(),
            name: upperWord,
            displayName: getNameForWord(upperWord),
            emojiHtml: emojiHtml
        });
    }
    
    // Duplicar para formar pares e embaralhar
    const deck = [...cards, ...cards].sort(() => Math.random() - 0.5);
    return deck;
}

async function initGame() {
    const gameBoard = document.getElementById('game-board');
    gameBoard.innerHTML = '';
    gameDeck = await createGameCards();
    flippedCards = [];
    matchedPairs = 0;
    moves = 0;
    document.getElementById('moves').innerText = '0';
    canFlip = true;
    
    gameDeck.forEach((card, index) => {
        const cardElement = document.createElement('div');
        cardElement.className = 'memory-card';
        cardElement.dataset.id = index;
        cardElement.dataset.name = card.name;
        
        cardElement.innerHTML = `
            <div class="card-back"><i class="bi bi-question-lg" style="font-size: 3rem;"></i></div>
            <div class="card-front">
                ${card.emojiHtml}
                <div class="card-name">${card.displayName}</div>
            </div>
        `;
        
        cardElement.onclick = () => flipCard(cardElement, card);
        gameBoard.appendChild(cardElement);
    });
}

function flipCard(cardElement, card) {
    if (!canFlip || cardElement.classList.contains('flipped') || cardElement.classList.contains('matched')) return;
    
    cardElement.classList.add('flipped');
    flippedCards.push({ element: cardElement, card: card });
    
    if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').innerText = moves;
        checkMatch();
    }
}

function checkMatch() {
    canFlip = false;
    const [card1, card2] = flippedCards;
    
    if (card1.card.name === card2.card.name) {
        card1.element.classList.add('matched');
        card2.element.classList.add('matched');
        matchedPairs++;
        flippedCards = [];
        canFlip = true;
        
        if (matchedPairs === gameDeck.length / 2) {
            setTimeout(() => alert(`🎉 Parabéns! Você completou em ${moves} tentativas!`), 500);
        }
    } else {
        setTimeout(() => {
            card1.element.classList.remove('flipped');
            card2.element.classList.remove('flipped');
            flippedCards = [];
            canFlip = true;
        }, 1000);
    }
}

function resetGame() {
    initGame();
}

document.addEventListener('DOMContentLoaded', initGame);
</script>
{% endblock %}
