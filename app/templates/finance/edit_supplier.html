{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-primary text-white p-4 rounded-top-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2"></i> Editar Fornecedor</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <!-- Dados Básicos -->
                        <h5 class="fw-bold mb-3"><i class="bi bi-building me-2 text-primary"></i> Dados Básicos</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold small">Nome / Razão Social *</label>
                                <input type="text" name="name" class="form-control bg-light border-0" value="{{ supplier.name }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">País</label>
                                <select name="country" id="country" class="form-select bg-light border-0">
                                    <option value="Portugal" {{ 'selected' if supplier.country == 'Portugal' }}>Portugal</option>
                                    <option value="Brasil" {{ 'selected' if supplier.country == 'Brasil' }}>Brasil</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small" id="tax_label">{{ 'NIF (Portugal)' if supplier.country == 'Portugal' else 'CNPJ / CPF' }}</label>
                                <input type="text" name="tax_id" id="tax_id" class="form-control bg-light border-0" value="{{ supplier.tax_id or '' }}">
                                <input type="hidden" name="tax_id_type" id="tax_id_type" value="{{ supplier.tax_id_type or 'NIF' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">E-mail</label>
                                <input type="email" name="email" class="form-control bg-light border-0" value="{{ supplier.email or '' }}">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Telefone</label>
                                <input type="tel" name="phone" class="form-control bg-light border-0" value="{{ supplier.phone or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Celular / WhatsApp</label>
                                <input type="tel" name="mobile" class="form-control bg-light border-0" value="{{ supplier.mobile or '' }}">
                            </div>
                        </div>

                        <!-- Endereço -->
                        <h5 class="fw-bold mb-3 mt-4"><i class="bi bi-geo-alt me-2 text-primary"></i> Endereço</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold small">Logradouro</label>
                                <input type="text" name="address" class="form-control bg-light border-0" value="{{ supplier.address or '' }}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Número</label>
                                <input type="text" name="address_number" class="form-control bg-light border-0" value="{{ supplier.address_number or '' }}">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Complemento</label>
                                <input type="text" name="complement" class="form-control bg-light border-0" value="{{ supplier.complement or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small" id="neighborhood_label">{{ 'Bairro' if supplier.country == 'Brasil' else 'Freguesia' }}</label>
                                <input type="text" name="neighborhood" class="form-control bg-light border-0" value="{{ supplier.neighborhood or '' }}">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Cidade</label>
                                <input type="text" name="city" class="form-control bg-light border-0" value="{{ supplier.city or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small" id="state_label">{{ 'Estado (UF)' if supplier.country == 'Brasil' else 'Distrito' }}</label>
                                <input type="text" name="state" class="form-control bg-light border-0" value="{{ supplier.state or '' }}">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small" id="postal_label">{{ 'CEP' if supplier.country == 'Brasil' else 'Código Postal' }}</label>
                                <input type="text" name="postal_code" class="form-control bg-light border-0" value="{{ supplier.postal_code or '' }}">
                            </div>
                        </div>

                        <!-- Dados Bancários -->
                        <h5 class="fw-bold mb-3 mt-4"><i class="bi bi-bank me-2 text-primary"></i> Dados Bancários</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Banco</label>
                                <input type="text" name="bank_name" class="form-control bg-light border-0" value="{{ supplier.bank_name or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Número da Conta</label>
                                <input type="text" name="bank_account" class="form-control bg-light border-0" value="{{ supplier.bank_account or '' }}">
                            </div>
                        </div>

                        <div id="pt_fields" class="row g-3 mb-4" style="{{ 'display: flex;' if supplier.country != 'Brasil' else 'display: none;' }}">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">IBAN</label>
                                <input type="text" name="iban" class="form-control bg-light border-0" value="{{ supplier.iban or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">SWIFT/BIC</label>
                                <input type="text" name="swift" class="form-control bg-light border-0" value="{{ supplier.swift or '' }}">
                            </div>
                        </div>

                        <div id="br_fields" class="row g-3 mb-4" style="{{ 'display: flex;' if supplier.country == 'Brasil' else 'display: none;' }}">
                            <div class="col-md-12">
                                <label class="form-label fw-bold small">Chave PIX</label>
                                <input type="text" name="pix_key" class="form-control bg-light border-0" value="{{ supplier.pix_key or '' }}">
                            </div>
                        </div>

                        <!-- Pessoa de Contato -->
                        <h5 class="fw-bold mb-3 mt-4"><i class="bi bi-person-badge me-2 text-primary"></i> Pessoa de Contato</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Nome do Contato</label>
                                <input type="text" name="contact_person" class="form-control bg-light border-0" value="{{ supplier.contact_person or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Telefone do Contato</label>
                                <input type="tel" name="contact_phone" class="form-control bg-light border-0" value="{{ supplier.contact_phone or '' }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">E-mail do Contato</label>
                            <input type="email" name="contact_email" class="form-control bg-light border-0" value="{{ supplier.contact_email or '' }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">Observações</label>
                            <textarea name="notes" class="form-control bg-light border-0" rows="3">{{ supplier.notes or '' }}</textarea>
                        </div>

                        <div class="form-check mb-4">
                            <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {{ 'checked' if supplier.is_active }}>
                            <label class="form-check-label" for="is_active">
                                Fornecedor ativo
                            </label>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">
                                <i class="bi bi-check-lg me-2"></i> Salvar Alterações
                            </button>
                            <a href="{{ url_for('finance.list_suppliers') }}" class="btn btn-outline-secondary px-4 py-2">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('country').addEventListener('change', function() {
    const country = this.value;
    const taxLabel = document.getElementById('tax_label');
    const neighborhoodLabel = document.getElementById('neighborhood_label');
    const stateLabel = document.getElementById('state_label');
    const postalLabel = document.getElementById('postal_label');
    const ptFields = document.getElementById('pt_fields');
    const brFields = document.getElementById('br_fields');
    const taxInput = document.getElementById('tax_id');
    const taxType = document.getElementById('tax_id_type');
    
    if (country === 'Brasil') {
        taxLabel.innerHTML = 'CNPJ / CPF';
        neighborhoodLabel.innerHTML = 'Bairro';
        stateLabel.innerHTML = 'Estado (UF)';
        postalLabel.innerHTML = 'CEP';
        taxInput.placeholder = 'CNPJ: 00.000.000/0000-00 ou CPF: 000.000.000-00';
        taxType.value = 'CNPJ';
        ptFields.style.display = 'none';
        brFields.style.display = 'flex';
    } else {
        taxLabel.innerHTML = 'NIF (Portugal)';
        neighborhoodLabel.innerHTML = 'Freguesia';
        stateLabel.innerHTML = 'Distrito';
        postalLabel.innerHTML = 'Código Postal';
        taxInput.placeholder = '999999999';
        taxType.value = 'NIF';
        ptFields.style.display = 'flex';
        brFields.style.display = 'none';
    }
});
</script>
{% endblock %}
